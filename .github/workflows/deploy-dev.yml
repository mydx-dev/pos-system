name: Deploy Dev

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pull-requests: write
  issues: write
  actions: write

jobs:
  deploy:
    if: >
        github.event_name == 'workflow_dispatch' ||
        (
            github.event_name == 'workflow_run' &&
            github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.event == 'pull_request'
        )
    runs-on: ubuntu-latest
    environment: dev

    env:
      ENVIRONMENT: dev
      DEPLOY_ID: ${{ vars.DEPLOY_ID }}

    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_run'
        with:
            ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch'

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: corepack enable

      - run: corepack prepare pnpm@9.12.3 --activate

      - run: pnpm --version

      - name: Configure npm auth
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NPM_TOKEN}" > .npmrc
          echo "@mydx-dev:registry=https://npm.pkg.github.com" >> .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: pnpm install

      - name: Debug deploy ID
        run: echo "DEPLOY_ID=${{ vars.DEPLOY_ID }}"

      - name: Write clasp credentials
        run: |
          printf '%s' "$CLASP_CREDENTIALS" > ~/.clasprc.json
          chmod 600 ~/.clasprc.json
        env:
          CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}

      - name: Write clasp config
        run: |
          mkdir -p config
          printf '%s' "$CLASP_JSON" > config/.clasp.dev.json
        env:
          CLASP_JSON: ${{ secrets.CLASP_JSON_DEV }}

      - name: Build project
        run: pnpm gas-boost build dev

      - name: Push to GAS
        run: |
          pnpm gas-boost push dev

      - name: Deploy to GAS
        id: deploy
        run: |
          pnpm gas-boost deploy dev | tee deploy.log

          URL=$(grep -Eo 'WEB_APP_URL=\S+' deploy.log | tail -n1 | cut -d= -f2-)
          DEPLOY_ID=$(grep -Eo 'DEPLOY_ID=\S+' deploy.log | tail -n1 | cut -d= -f2-)

          if [ -z "$DEPLOY_ID" ]; then
            DEPLOY_ID=$(grep -Eo 'New deploymentId: \S+' deploy.log | tail -n1 | awk '{print $3}')
          fi

          echo "web_app_url=$URL" >> $GITHUB_OUTPUT
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT

      - name: Persist deploy ID
        if: ${{ steps.deploy.outputs.deploy_id != '' && vars.DEPLOY_ID == '' }}
        run: |
          gh variable set DEPLOY_ID \
            --env dev \
            --body "${DEPLOY_ID}" \
            --repo "${GITHUB_REPOSITORY}"
        env:
          DEPLOY_ID: ${{ steps.deploy.outputs.deploy_id }}
          GH_TOKEN: ${{ secrets.GAS_BOOST_PAT }}

      - name: Detect PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            let prNumber = null;

            if (eventName === 'workflow_run') {
              const prs = context.payload.workflow_run.pull_requests || [];
              if (prs.length) prNumber = prs[0].number;
            } else if (eventName === 'push') {
              const { owner, repo } = context.repo;
              const res = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: context.sha,
              });
              if (res.data.length) prNumber = res.data[0].number;
            }

            core.setOutput('number', prNumber || '');

      - name: Build comment
        id: comment
        if: ${{ steps.pr.outputs.number != '' }}
        run: |
          if [ -n "${{ steps.deploy.outputs.web_app_url }}" ]; then
            echo "body=**dev** deploy: ${{ steps.deploy.outputs.web_app_url }}" >> $GITHUB_OUTPUT
          else
            echo "body=**dev** deploy completed (URL not found)" >> $GITHUB_OUTPUT
          fi

      - name: Print deploy URL
        if: ${{ steps.pr.outputs.number == '' }}
        run: |
          if [ -n "${{ steps.deploy.outputs.web_app_url }}" ]; then
            echo "dev deploy: ${{ steps.deploy.outputs.web_app_url }}"
          else
            echo "dev deploy completed (URL not found)"
          fi

      - name: Comment on PR
        if: ${{ steps.pr.outputs.number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: process.env.COMMENT_BODY,
            });
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          COMMENT_BODY: ${{ steps.comment.outputs.body }}